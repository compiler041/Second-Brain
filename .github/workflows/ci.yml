name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Lint Code
        run: npm run lint
      
      - name: Build Code
        run: npm run build

  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './server/package-lock.json'
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Build Code
        run: npm run build

  docker-ci:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build and Push Frontend
        run: |
          docker build -t vaibhav0041/second-brain-client:latest -f docker/DockerFile.frontend .
          if [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ github.event_name }}" = "push" ]; then
            docker push vaibhav0041/second-brain-client:latest
          fi
          
      - name: Build and Push Backend
        run: |
          docker build -t vaibhav0041/second-brain-server:latest -f docker/DockerFile.backend .
          if [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ github.event_name }}" = "push" ]; then
            docker push vaibhav0041/second-brain-server:latest
          fi

  deploy:
    name: Deploy to EC2
    needs: [frontend-ci, backend-ci, docker-ci]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull the latest images from Docker Hub
            docker pull vaibhav0041/second-brain-client:latest
            docker pull vaibhav0041/second-brain-server:latest
            
            # Stop existing containers
            docker stop backend frontend || true
            docker rm backend frontend || true
            
            # Run the new containers
            docker run -d --name backend -p 3000:3000 vaibhav0041/second-brain-server:latest
            docker run -d --name frontend -p 80:80 vaibhav0041/second-brain-client:latest